<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Comentários</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0f0c29;
      color: #fff;
      min-height: 100vh;
      padding: 20px;
    }
    .container {
      max-width: 760px;
      margin: 0 auto;
    }
    .topbar {
      display: flex;
      flex-direction: column;
      gap: 8px;
      margin-bottom: 24px;
    }
    textarea {
      width: 100%;
      min-height: 100px;
      padding: 12px 16px;
      font-size: 0.95rem;
      font-family: inherit;
      border: 1px solid rgba(255,255,255,0.2);
      background: rgba(255,255,255,0.05);
      color: #fff;
      border-radius: 10px;
      outline: none;
      resize: vertical;
    }
    textarea:focus { border-color: #ff6b6b; }
    .row { display: flex; gap: 8px; align-items: center; }
    .info { flex: 1; font-size: 0.82rem; opacity: 0.55; }
    button {
      background: linear-gradient(90deg, #ff6b6b, #ee5a6f);
      color: white;
      border: none;
      padding: 12px 22px;
      font-size: 0.95rem;
      font-weight: 600;
      border-radius: 10px;
      cursor: pointer;
    }
    button:disabled { opacity: 0.5; cursor: wait; }
    .status {
      padding: 16px;
      background: rgba(255,255,255,0.05);
      border-radius: 10px;
      margin-bottom: 16px;
      font-size: 0.9rem;
      opacity: 0.85;
    }
    .comment {
      padding: 16px;
      border-bottom: 1px solid rgba(255,255,255,0.08);
      display: flex;
      gap: 12px;
    }
    .avatar {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      flex-shrink: 0;
      background: #333;
      object-fit: cover;
    }
    .body { flex: 1; min-width: 0; }
    .head {
      display: flex;
      gap: 8px;
      align-items: center;
      margin-bottom: 4px;
      font-size: 0.85rem;
    }
    .author { font-weight: 600; }
    .time { opacity: 0.55; }
    .text {
      font-size: 0.95rem;
      line-height: 1.5;
      white-space: pre-wrap;
      word-wrap: break-word;
    }
    .meta {
      margin-top: 8px;
      font-size: 0.8rem;
      opacity: 0.6;
      display: flex;
      gap: 16px;
    }
    .error {
      padding: 20px;
      background: rgba(238,90,111,0.15);
      border: 1px solid rgba(238,90,111,0.4);
      border-radius: 10px;
      color: #ffb3bd;
      margin-bottom: 16px;
    }
    .video-block {
      margin-bottom: 32px;
      padding-bottom: 8px;
      border-bottom: 2px solid rgba(255,255,255,0.1);
    }
    .video-title {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 12px;
      padding: 12px 16px;
      background: rgba(255,107,107,0.08);
      border-left: 3px solid #ff6b6b;
      border-radius: 4px;
    }
    .video-title h2 { font-size: 1rem; font-weight: 600; }
    .video-title a { color: #ff6b6b; text-decoration: none; font-size: 0.85rem; }
    .video-title .err { color: #ffb3bd; font-size: 0.85rem; }
  </style>
</head>
<body>
  <div class="container">
    <div class="topbar">
      <textarea id="input" placeholder="Cole um ou vários links/IDs (um por linha, ou separados por vírgula/espaço)"></textarea>
      <div class="row">
        <span class="info">Dica: dá pra colar IDs ou URLs completas misturados</span>
        <button id="btn" onclick="carregar()">Buscar</button>
      </div>
    </div>
    <div id="out"></div>
  </div>

  <script>
    function extrairIds(texto) {
      const ids = new Set();
      const partes = texto.split(/[\s,;\n]+/).filter(Boolean);
      for (const p of partes) {
        const m = p.match(/(?:v=|youtu\.be\/|\/embed\/|\/shorts\/)([A-Za-z0-9_-]{6,15})/);
        if (m) { ids.add(m[1]); continue; }
        if (/^[A-Za-z0-9_-]{6,15}$/.test(p)) ids.add(p);
      }
      return [...ids];
    }

    function escapeHtml(s) {
      return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
    }

    function renderComentarios(comments) {
      return comments.map(c => `
        <div class="comment">
          ${c.avatar ? `<img class="avatar" src="${escapeHtml(c.avatar)}" loading="lazy">` : '<div class="avatar"></div>'}
          <div class="body">
            <div class="head">
              <span class="author">${escapeHtml(c.author)}</span>
              <span class="time">${escapeHtml(c.publishedTime)}</span>
            </div>
            <div class="text">${escapeHtml(c.text)}</div>
            <div class="meta">
              <span>👍 ${escapeHtml(c.likes)}</span>
              ${c.replyCount > 0 ? `<span>💬 ${c.replyCount} respostas</span>` : ''}
            </div>
          </div>
        </div>
      `).join('');
    }

    async function buscarUm(id) {
      try {
        const r = await fetch(`/api/comments?id=${encodeURIComponent(id)}`);
        const data = await r.json();
        if (!r.ok) return { id, error: data.error || 'falhou' };
        return { id, count: data.count, comments: data.comments };
      } catch (e) {
        return { id, error: e.message };
      }
    }

    async function carregar() {
      const input = document.getElementById('input');
      const btn = document.getElementById('btn');
      const out = document.getElementById('out');
      const ids = extrairIds(input.value);

      if (ids.length === 0) {
        out.innerHTML = '<div class="error">Nenhum link/ID válido encontrado</div>';
        return;
      }

      btn.disabled = true;
      out.innerHTML = `<div class="status">Buscando comentários de ${ids.length} ${ids.length === 1 ? 'vídeo' : 'vídeos'}...</div>`;

      const resultados = await Promise.all(ids.map(buscarUm));

      const totalComentarios = resultados.reduce((acc, r) => acc + (r.count || 0), 0);
      const sucessos = resultados.filter(r => !r.error).length;
      const status = `<div class="status">${totalComentarios} comentários • ${sucessos}/${ids.length} vídeos OK</div>`;

      const html = resultados.map(r => {
        const link = `<a href="https://www.youtube.com/watch?v=${r.id}" target="_blank">abrir no YouTube</a>`;
        if (r.error) {
          return `
            <div class="video-block">
              <div class="video-title">
                <h2>${escapeHtml(r.id)}</h2>
                <span class="err">erro: ${escapeHtml(r.error)}</span>
              </div>
            </div>
          `;
        }
        return `
          <div class="video-block">
            <div class="video-title">
              <h2>${escapeHtml(r.id)} • ${r.count} comentários</h2>
              ${link}
            </div>
            ${renderComentarios(r.comments)}
          </div>
        `;
      }).join('');

      out.innerHTML = status + html;
      btn.disabled = false;
    }

    const url = new URL(window.location.href);
    const idParam = url.searchParams.get('id') || url.searchParams.get('ids');
    if (idParam) {
      document.getElementById('input').value = idParam.replace(/,/g, '\n');
      carregar();
    }

    document.getElementById('input').addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && (e.ctrlKey || e.metaKey)) carregar();
    });
  </script>
</body>
</html>
