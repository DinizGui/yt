<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>gatilho-yt • painel</title>
<style>
  :root {
    --bg: #0a0a0f;
    --panel: #15151f;
    --line: #1f1f2e;
    --fg: #e6e6f0;
    --muted: #777788;
    --accent: #ff3355;
    --ok: #22cc88;
    --warn: #f5a623;
    --err: #ff4466;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font: 14px/1.5 -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: var(--bg);
    color: var(--fg);
    min-height: 100vh;
    padding: 24px;
  }
  .wrap { max-width: 900px; margin: 0 auto; display: grid; gap: 16px; }
  header { display: flex; justify-content: space-between; align-items: baseline; }
  h1 { font-size: 20px; font-weight: 600; letter-spacing: -0.01em; }
  h1 span { color: var(--accent); }
  .video-id { color: var(--muted); font-family: 'SF Mono', Consolas, monospace; font-size: 12px; }
  .card {
    background: var(--panel);
    border: 1px solid var(--line);
    border-radius: 12px;
    padding: 20px;
  }
  .stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; }
  .stat { text-align: center; }
  .stat .n { font-size: 36px; font-weight: 700; line-height: 1; }
  .stat .l { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.08em; margin-top: 6px; }
  .stat.ok .n { color: var(--ok); }
  .stat.fail .n { color: var(--err); }
  button#fire {
    width: 100%;
    background: var(--accent);
    color: #fff;
    border: 0;
    border-radius: 10px;
    padding: 18px;
    font-size: 16px;
    font-weight: 700;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    cursor: pointer;
    transition: transform .08s, opacity .2s;
  }
  button#fire:hover { transform: translateY(-1px); }
  button#fire:active { transform: translateY(0); }
  button#fire:disabled { opacity: 0.5; cursor: not-allowed; background: var(--muted); }
  .status {
    display: flex; align-items: center; gap: 8px;
    font-size: 13px; color: var(--muted);
    margin-top: 12px;
  }
  .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--muted); }
  .dot.run { background: var(--warn); animation: pulse 1s infinite; }
  .dot.idle { background: var(--ok); }
  @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
  .log {
    background: #08080d;
    border: 1px solid var(--line);
    border-radius: 10px;
    padding: 14px;
    font-family: 'SF Mono', Consolas, monospace;
    font-size: 12px;
    line-height: 1.6;
    height: 320px;
    overflow-y: auto;
    color: #b8b8c8;
  }
  .log .line { white-space: pre-wrap; word-break: break-all; }
  .log .line .ts { color: #555; margin-right: 8px; }
  .log .line.ok { color: var(--ok); }
  .log .line.warn { color: var(--warn); }
  .log .line.err { color: var(--err); }
  .log:empty::before { content: 'sem logs ainda — clica em DAR VIEW'; color: var(--muted); }
  footer { text-align: center; color: var(--muted); font-size: 12px; }
  footer a { color: var(--muted); }
</style>
</head>
<body>
  <div class="wrap">
    <header>
      <h1>gatilho<span>-yt</span></h1>
      <div class="video-id" id="vid">…</div>
    </header>

    <div class="card stats">
      <div class="stat"><div class="n" id="total">0</div><div class="l">total</div></div>
      <div class="stat ok"><div class="n" id="ok">0</div><div class="l">ok</div></div>
      <div class="stat fail"><div class="n" id="fail">0</div><div class="l">falhou</div></div>
    </div>

    <div class="card">
      <button id="fire">dar uma view</button>
      <div class="status">
        <span class="dot idle" id="dot"></span>
        <span id="status">pronto</span>
      </div>
    </div>

    <div class="card">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">
        <strong style="font-size:12px;text-transform:uppercase;letter-spacing:.08em;color:var(--muted)">log ao vivo</strong>
        <button id="clear" style="background:transparent;border:1px solid var(--line);color:var(--muted);padding:4px 10px;border-radius:6px;font-size:11px;cursor:pointer">limpar</button>
      </div>
      <div class="log" id="log"></div>
    </div>

    <footer>
      <a id="watchLink" target="_blank">abrir no youtube ↗</a>
    </footer>
  </div>

<script>
  const $ = (id) => document.getElementById(id);
  const fire = $('fire');
  const dot = $('dot');
  const statusEl = $('status');
  const logEl = $('log');

  function addLog(msg, ts) {
    const line = document.createElement('div');
    line.className = 'line';
    let cls = '';
    if (/OK:/.test(msg)) cls = 'ok';
    else if (/AVISO|err/i.test(msg)) cls = 'warn';
    else if (/erro/i.test(msg)) cls = 'err';
    if (cls) line.classList.add(cls);
    const time = ts ? new Date(ts).toISOString().slice(11, 19) : '';
    line.innerHTML = `<span class="ts">${time}</span>${msg.replace(/&/g, '&amp;').replace(/</g, '&lt;')}`;
    logEl.appendChild(line);
    logEl.scrollTop = logEl.scrollHeight;
  }

  function setStats(s) {
    $('total').textContent = s.total;
    $('ok').textContent = s.ok;
    $('fail').textContent = s.fail;
    fire.disabled = s.running;
    if (s.running) {
      dot.className = 'dot run';
      statusEl.textContent = 'rodando — aguardando ~35s…';
      fire.textContent = 'rodando…';
    } else {
      dot.className = 'dot idle';
      statusEl.textContent = 'pronto';
      fire.textContent = 'dar uma view';
    }
  }

  const ev = new EventSource('/events');
  ev.addEventListener('hello', (e) => {
    const d = JSON.parse(e.data);
    $('vid').textContent = d.videoId;
    $('watchLink').href = d.watchUrl;
    $('watchLink').textContent = `abrir ${d.videoId} no youtube ↗`;
    setStats(d.stats);
  });
  ev.addEventListener('log', (e) => {
    const d = JSON.parse(e.data);
    addLog(d.msg, d.ts);
  });
  ev.addEventListener('stats', (e) => setStats(JSON.parse(e.data)));
  ev.onerror = () => { statusEl.textContent = 'desconectado — reconectando…'; };

  fire.addEventListener('click', async () => {
    fire.disabled = true;
    try {
      const r = await fetch('/trigger', { method: 'POST' });
      if (!r.ok) {
        const j = await r.json().catch(() => ({}));
        addLog(`erro ao disparar: ${j.error || r.status}`);
      }
    } catch (e) {
      addLog(`erro: ${e.message}`);
      fire.disabled = false;
    }
  });

  $('clear').addEventListener('click', () => { logEl.innerHTML = ''; });
</script>
</body>
</html>
