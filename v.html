<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>View</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      min-height: 100vh;
      background: #0a0a0a;
      color: #888;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .box { text-align: center; max-width: 360px; }
    .ok { color: #6bcb77; font-size: 0.9rem; }
    .err { color: #ff6b6b; }
  </style>
</head>
<body>
  <div class="box" id="root">...</div>
  <script type="module">
    import { VIDEO_ID } from './video.config.js';

    const root = document.getElementById('root');

    fetch('/api/view')
      .then((r) => r.json().then((d) => ({ ok: r.ok, d })))
      .then(({ ok, d }) => {
        if (!ok) {
          root.innerHTML = `<p class="err">${d.error || 'falhou'}</p>`;
          return;
        }
        root.innerHTML = `<p class="ok">view • ${d.videoId || VIDEO_ID}</p>`;
      })
      .catch(() => {
        root.innerHTML = '<p class="err">erro de rede</p>';
      });
  </script>
</body>
</html>
