<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>View</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; background: #000; overflow: hidden; }
    #player {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
    }
    #player iframe {
      width: 100%;
      height: 100%;
    }
    .status {
      position: fixed;
      bottom: 8px;
      left: 0;
      right: 0;
      text-align: center;
      font: 0.7rem/1 -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      color: rgba(255,255,255,0.25);
      pointer-events: none;
      z-index: 2;
    }
  </style>
</head>
<body>
  <div id="player"></div>
  <div class="status" id="status">view • 2sTS91HNoIs</div>
  <script type="module" src="/js/view.js"></script>
</body>
</html>
